<!DOCTYPE html>
<html>
<head>
    <title>Cryptography</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #667eea, #764ba2);
            text-align: center;
            margin: 0;
        }

        .container {
            background: rgba(255, 255, 255, 0.95);
            padding: 25px;
            margin: auto;
            width: 420px;
            margin-top: 60px;
            border-radius: 15px;
            box-shadow: 0px 8px 25px rgba(0,0,0,0.25);
            backdrop-filter: blur(8px);
        }

        h2 {
            color: #2c3e50;
            font-weight: 600;
            letter-spacing: 1px;
        }

        /* MENU BUTTONS */
        .menu {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 15px;
        }

        .menu button {
            padding: 10px 15px;
            border: none;
            border-radius: 8px;
            background: linear-gradient(135deg, #36d1dc, #5b86e5);
            color: white;
            cursor: pointer;
            font-size: 14px;
            transition: 0.3s;
            font-weight: 500;
        }

        .menu button:hover {
            transform: scale(1.08);
            box-shadow: 0px 4px 10px rgba(0,0,0,0.2);
        }

        input {
            padding: 10px;
            margin: 6px;
            border-radius: 8px;
            border: 1px solid #ddd;
            width: 80%;
            font-family: 'Poppins', sans-serif;
        }

        button.action {
            width: 80%;
            margin-top: 10px;
            background: linear-gradient(135deg, #ff9a44, #fc6076);
            color: white;
            font-weight: 500;
        }

        button.action:hover {
            transform: scale(1.05);
        }

        #output {
            margin-top: 10px;
            font-weight: 500;
            color: #333;
        }
    </style>
</head>

<body>

<div class="container">
    <h2>🔐 Cryptography</h2>

    <div class="menu">
        <button onclick="show('vigenere')">Vigenère</button>
        <button onclick="show('rail')">Rail Fence</button>
        <button onclick="show('rsa')">RSA</button>
    </div>

    <div id="content"></div>
</div>

<script src="script.js"></script>

</body>

</html>
